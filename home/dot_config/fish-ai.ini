[fish-ai]
configuration = anthropic

[anthropic]
provider = anthropic
model = claude-sonnet-4-6
# API key is read from the environment at runtime (fish-ai expands $VARs in
# values). The key lives in ~/.secrets/llm — loaded by config/envs/llm.fish —
# so it stays out of the source tree. Using an env var instead of the macOS
# keyring also sidesteps the keychain failing under tmux (error -25308).
api_key = $FISH_AI_ANTHROPIC_API_KEY
